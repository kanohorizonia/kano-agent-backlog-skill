name: KanoAgentSkills / Release Gates

run-name: ${{ github.event.inputs.jenkins_build_name && format('Jenkins_{0}_{1}', github.event.inputs.jenkins_stage_name || 'release-gates', github.event.inputs.jenkins_build_name) || format('GitHub_release-gates_{0}_{1}_{2}', github.event.repository.name, github.ref_name, github.run_number) }}

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      jenkins_build_name:
        description: Human-readable Jenkins build name for GitHub Actions run lists.
        required: false
        default: ""
        type: string
      jenkins_stage_name:
        description: Jenkins stage/job slug to show in the GitHub Actions run name.
        required: false
        default: release-gates
        type: string

permissions:
  contents: read

jobs:
  native-gates-linux:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Create kanohorizonia Jenkins app token
        id: jenkins-app-token
        if: ${{ vars.KANO_JENKINS_APP_CLIENT_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.KANO_JENKINS_APP_CLIENT_ID }}
          private-key: ${{ secrets.KANO_JENKINS_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            kano-agent-backlog-skill
            kano-cpp-infra
          permission-contents: read

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.jenkins-app-token.outputs.token || github.token }}
          persist-credentials: false

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang ninja-build build-essential

      - name: Note default network assumption
        run: |
          echo "Default native presets may fetch third-party dependencies from the network."
          echo "For stricter deterministic builds, use system/submodule/vcpkg dependency modes."

      - name: Build native release CLI
        run: bash src/shell/support/self-build.sh release

      - name: Run native release smoke tests
        run: bash src/shell/test/native-test.sh linux-ninja-clang Release

      - name: Verify native runtime gate
        run: bash src/shell/test/native-runtime-gate.sh

      - name: Run native release phase1 gate
        run: |
          mkdir -p "$RUNNER_TEMP/backlog"
          bash scripts/kob admin release check \
            --version "$(tr -d '\r\n' < VERSION)" \
            --topic release-gate \
            --agent ci \
            --phase phase1 \
            --backlog-root "$RUNNER_TEMP/backlog"
