[workspace]
name = "kano-agent-backlog-skill"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]

[dependencies]
cmake = ">=3.21"
git = "*"
ninja = "*"

[target.linux-64.dependencies]
bash = "*"

[target.osx-64.dependencies]
bash = "*"

[target.osx-arm64.dependencies]
bash = "*"

# =============================================================================
# Universal tasks (work on all platforms)
# =============================================================================
[tasks]
env-summary = "git --version && cmake --version && ninja --version"

# =============================================================================
# Windows-specific (win-64)
# =============================================================================
[target.win-64.tasks]
# Development build (Debug preset - fast iteration)
build = "bash src/cpp/shared/infra/scripts/backlog/windows/ninja-msvc-debug.sh"
build-dev = "bash src/cpp/shared/infra/scripts/backlog/windows/ninja-msvc-debug.sh"
build-dev-win = "bash src/cpp/shared/infra/scripts/backlog/windows/ninja-msvc-debug.sh"

# Release build (optimized)
build-release = "bash src/cpp/shared/infra/scripts/backlog/windows/ninja-msvc-release.sh"
build-release-win = "bash src/cpp/shared/infra/scripts/backlog/windows/ninja-msvc-release.sh"

# Coverage workflow (CI-ready) - all steps use infra scripts
build-coverage = "bash src/cpp/shared/infra/scripts/backlog/windows/ninja-msvc-coverage-build.sh"
test-coverage = "bash src/cpp/build/script/windows/ninja-msvc-coverage-run.sh"
report-coverage = "bash src/cpp/build/script/windows/ninja-msvc-coverage-report.sh"

# Full coverage workflow: build + test + report
coverage-all = "bash src/cpp/shared/infra/scripts/backlog/windows/ninja-msvc-coverage-build.sh && bash src/cpp/build/script/windows/ninja-msvc-coverage-run.sh && bash src/cpp/build/script/windows/ninja-msvc-coverage-report.sh"

# Tests
quick-test = "bash src/cpp/build/script/windows/run_tests.sh windows-ninja-msvc"

# =============================================================================
# Linux-specific (linux-64)
# =============================================================================
[target.linux-64.tasks]
# Development build (Debug preset - fast iteration)
build = "bash src/cpp/build/script/linux/build_linux_ninja_clang_debug.sh"
build-dev = "bash src/cpp/build/script/linux/build_linux_ninja_clang_debug.sh"

# Release build (optimized)
build-release = "bash src/cpp/build/script/linux/build_linux_ninja_gcc_release.sh"

# Tests: linux-64 test runner TBD (no src/cpp/build/script/linux/run_tests.sh)
