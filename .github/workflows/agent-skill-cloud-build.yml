name: KanoAgentSkills / Cloud Build

run-name: ${{ inputs.jenkins_build_name != '' && format('Jenkins_{0}_{1}', inputs.platform || 'linux-x64', inputs.jenkins_build_name) || format('Manual_{0}_{1}', inputs.platform || 'linux-x64', inputs.request_id || github.run_id) }}

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: Jenkins request identifier.
        required: false
        default: manual
        type: string
      build_ref:
        description: Ref to checkout for non-Jenkins/manual runs.
        required: false
        default: main
        type: string
      jenkins_build_name:
        description: Human-readable Jenkins build name for GitHub Actions run lists.
        required: false
        default: ""
        type: string
      package_id:
        description: Package identifier used in artifact names.
        required: false
        default: kano-agent-backlog-skill
        type: string
      package_version:
        description: Package version.
        required: false
        default: 0.0.0-dev
        type: string
      platform:
        description: Target platform.
        required: true
        type: choice
        options:
          - windows-x64
          - windows-arm64
          - linux-x64
          - linux-arm64
          - macos-x64
          - macos-arm64
      source_commit:
        description: Source commit expected by Jenkins.
        required: false
        default: HEAD
        type: string
      source_ref:
        description: Source ref to checkout.
        required: false
        default: main
        type: string
      release_mode:
        description: ci or release.
        required: false
        default: ci
        type: string
      artifact_contract_version:
        description: Artifact manifest contract version.
        required: false
        default: "1"
        type: string
      retention_days:
        description: Temporary artifact retention days.
        required: false
        default: "1"
        type: string
      run_python_tests:
        description: Run Python pytest gate when pyproject/tests exist.
        required: false
        default: "false"
        type: string
      run_native_tests:
        description: Run native smoke tests.
        required: false
        default: "true"
        type: string
      run_coverage:
        description: Run native coverage tasks when available.
        required: false
        default: "false"
        type: string
      publish_code_quality_coverage:
        description: Upload Cobertura XML to GitHub Code Quality.
        required: false
        default: "false"
        type: string
      report_retention_days:
        description: Report artifact retention days.
        required: false
        default: "14"
        type: string
      artifact_prefix:
        description: Prefix for uploaded report artifact names.
        required: false
        default: kano-agent-backlog-skill
        type: string
      required:
        description: Whether this platform is release-blocking.
        required: false
        default: "false"
        type: string
      experimental:
        description: Whether this platform is experimental.
        required: false
        default: "false"
        type: string

permissions:
  contents: read
  actions: read
  code-quality: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.platform || 'linux-x64' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ${{ fromJSON('{"windows-x64":"windows-2025","windows-arm64":"windows-11-arm","linux-x64":"ubuntu-24.04","linux-arm64":"ubuntu-24.04-arm","macos-x64":"macos-15-intel","macos-arm64":"macos-15"}')[inputs.platform || 'linux-x64'] }}
    timeout-minutes: 90
    defaults:
      run:
        shell: bash
    env:
      KANO_PLATFORM: ${{ inputs.platform || 'linux-x64' }}
      KANO_PACKAGE_ID: ${{ inputs.package_id || 'kano-agent-backlog-skill' }}
      KANO_PACKAGE_VERSION: ${{ inputs.package_version || '0.0.0-dev' }}
      KANO_REQUEST_ID: ${{ inputs.request_id || github.run_id }}
      KANO_SOURCE_COMMIT: ${{ inputs.source_commit || 'HEAD' }}
      KANO_SOURCE_REF: ${{ inputs.source_ref || inputs.build_ref || github.ref_name || 'main' }}
      KANO_RELEASE_MODE: ${{ inputs.release_mode || 'ci' }}
      KANO_ARTIFACT_CONTRACT_VERSION: ${{ inputs.artifact_contract_version || '1' }}
      KANO_REQUIRED: ${{ inputs.required || 'false' }}
      KANO_EXPERIMENTAL: ${{ inputs.experimental || 'false' }}
      KANO_RUN_PYTHON_TESTS: ${{ inputs.run_python_tests || 'false' }}
      KANO_RUN_NATIVE_TESTS: ${{ inputs.run_native_tests || 'true' }}
      KANO_RUN_COVERAGE: ${{ inputs.run_coverage || 'false' }}
      KANO_PUBLISH_CODE_QUALITY_COVERAGE: ${{ inputs.publish_code_quality_coverage || 'false' }}
      KANO_BACKLOG_NONINTERACTIVE: "1"
      KANO_TEST_NONINTERACTIVE: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GIT_TERMINAL_PROMPT: "0"

    steps:
      - name: Validate request
        run: |
          set -euo pipefail
          case "$KANO_PLATFORM" in
            windows-x64|windows-arm64|linux-x64|linux-arm64|macos-x64|macos-arm64) ;;
            *) echo "Unsupported platform: $KANO_PLATFORM" >&2; exit 2 ;;
          esac
          case "$KANO_ARTIFACT_CONTRACT_VERSION" in
            1) ;;
            *) echo "Unsupported artifact contract version: $KANO_ARTIFACT_CONTRACT_VERSION" >&2; exit 2 ;;
          esac

      - name: Resolve cloud artifact metadata
        id: artifact
        run: |
          set -euo pipefail
          safe_package="$(printf '%s' "$KANO_PACKAGE_ID" | sed -E 's/[^A-Za-z0-9._-]+/-/g; s/^-|-$//g')"
          [ -n "$safe_package" ] || safe_package="artifact"
          safe_report_prefix="$(printf '%s' "${{ inputs.artifact_prefix || inputs.package_id || 'kano-agent-backlog-skill' }}" | sed -E 's/[^A-Za-z0-9._-]+/-/g; s/^-|-$//g')"
          [ -n "$safe_report_prefix" ] || safe_report_prefix="$safe_package"
          retention_days="${{ inputs.report_retention_days || inputs.retention_days || '14' }}"
          case "$retention_days" in ''|*[!0-9]*) retention_days=1 ;; esac
          [ "$retention_days" -lt 1 ] && retention_days=1
          [ "$retention_days" -gt 30 ] && retention_days=30
          {
            echo "artifact_name=${safe_package}-${KANO_PLATFORM}-${KANO_REQUEST_ID}"
            echo "report_artifact_name=${safe_report_prefix}-reports-${KANO_PLATFORM}"
            echo "retention_days=$retention_days"
          } >> "$GITHUB_OUTPUT"

      - name: Create kanohorizonia Jenkins app token
        id: jenkins-app-token
        if: ${{ vars.KANO_JENKINS_APP_CLIENT_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.KANO_JENKINS_APP_CLIENT_ID }}
          private-key: ${{ secrets.KANO_JENKINS_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            kano-agent-backlog-skill
            kano-cpp-infra
            kano-cpp-test-skill
          permission-contents: read

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref || inputs.build_ref || github.ref_name }}
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.jenkins-app-token.outputs.token || github.token }}
          persist-credentials: false

      - name: Checkout requested commit
        run: |
          set -euo pipefail
          if [[ -n "$KANO_SOURCE_COMMIT" && "$KANO_SOURCE_COMMIT" != "HEAD" ]]; then
            git checkout --detach "$KANO_SOURCE_COMMIT"
          fi

      - name: Checkout kano-cpp-test-skill
        uses: actions/checkout@v4
        with:
          repository: kanohorizonia/kano-cpp-test-skill
          ref: main
          path: _tools/kano-cpp-test-skill
          token: ${{ steps.jenkins-app-token.outputs.token || github.token }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup .NET SDK
        if: startsWith(inputs.platform, 'windows-')
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.14

      - name: Install prerequisites
        run: |
          set -euo pipefail
          case "$KANO_PLATFORM" in
            linux-*)
              sudo apt-get update
              sudo apt-get install -y clang llvm ninja-build build-essential cmake
              ;;
            macos-*)
              brew list cmake >/dev/null 2>&1 || brew install cmake
              brew list ninja >/dev/null 2>&1 || brew install ninja
              brew list llvm >/dev/null 2>&1 || brew install llvm
              llvm_prefix="$(brew --prefix llvm)"
              echo "$llvm_prefix/bin" >> "$GITHUB_PATH"
              {
                echo "KANO_LLVM_COV=$llvm_prefix/bin/llvm-cov"
                echo "KANO_LLVM_PROFDATA=$llvm_prefix/bin/llvm-profdata"
              } >> "$GITHUB_ENV"
              ;;
            windows-*)
              choco install ninja cmake -y --no-progress || true
              choco install opencppcoverage -y --no-progress || true
              dotnet tool update --global Microsoft.CodeCoverage.Console || dotnet tool install --global Microsoft.CodeCoverage.Console || true
              echo "C:\\Program Files\\OpenCppCoverage" >> "$GITHUB_PATH"
              echo "C:\\Program Files (x86)\\OpenCppCoverage" >> "$GITHUB_PATH"
              echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
              ;;
          esac
          pixi install --manifest-path pixi.toml || true
          pixi install --manifest-path src/cpp/shared/infra/pixi.toml || true

      - name: Prepare report environment
        run: |
          set -euo pipefail
          mkdir -p .kano
          cat > .kano/cloud-report-env.sh <<'EOF'
          export KANO_REPORT_SLUG="${KANO_PACKAGE_ID}-${KANO_PLATFORM}"
          export KANO_REPORT_TITLE="${KANO_PACKAGE_ID} ${KANO_PLATFORM} Full Reports"
          export KANO_TEST_LANE="${KANO_TEST_LANE:-full}"
          export KANO_REPORT_ROOT="$GITHUB_WORKSPACE/out/reports/${KANO_PLATFORM}"
          export KANO_TEST_REPORTS_ROOT="$KANO_REPORT_ROOT/test-reports"
          export KANO_COVERAGE_REPORTS_ROOT="$GITHUB_WORKSPACE/out/coverage/${KANO_PLATFORM}/coverage-reports"
          export KANO_TEST_REPORT_DIR="$KANO_TEST_REPORTS_ROOT/$KANO_REPORT_SLUG"
          export KANO_COVERAGE_REPORT_DIR="$KANO_COVERAGE_REPORTS_ROOT/$KANO_REPORT_SLUG"
          export KANO_TEST_XML="$KANO_TEST_REPORT_DIR/tests.xml"
          export KANO_COVERAGE_XML="$KANO_COVERAGE_REPORT_DIR/cobertura.xml"
          export KANO_COVERAGE_HTML_DIR="$KANO_COVERAGE_REPORT_DIR/report-html"
          export KANO_COVERAGE_PROVIDER_HTML_DIR="$KANO_COVERAGE_REPORT_DIR/native-html"
          export KANO_COVERAGE_SUMMARY="$KANO_COVERAGE_REPORT_DIR/summary.txt"
          export KANO_TEST_SUITE_MAP_SRC="$GITHUB_WORKSPACE/src/shell/reports/suite-map.kano-agent-backlog.json"
          export KANO_BDD_METADATA_DIR="$KANO_REPORT_ROOT/raw/bdd-metadata"
          export KANO_BDD_PROJECT="$KANO_PACKAGE_ID"
          export KANO_BDD_ACTORS="user,kob"
          export KANO_REPORT_COMMAND="bash src/cpp/shared/infra/scripts/lib/package-reports-with-skill.sh"
          EOF

      - name: Run Python tests
        if: env.KANO_RUN_PYTHON_TESTS == 'true'
        run: |
          set -euo pipefail
          if [[ ! -f pyproject.toml && ! -d tests ]]; then
            echo "No pyproject.toml or tests directory; Python gate skipped." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          python -m pip install --upgrade pip
          if [[ -f pyproject.toml ]]; then
            python -m pip install -e ".[dev]" || python -m pip install -e .
          fi
          python -m pip install pytest pytest-cov
          mkdir -p out/reports/python out/coverage/python
          python -m pytest tests -q \
            --junitxml out/reports/python/tests.xml \
            --cov=kano_backlog_core \
            --cov=kano_backlog_ops \
            --cov=kano_backlog_cli \
            --cov-report=xml:out/coverage/python/cobertura.xml \
            --cov-report=html:out/coverage/python/html

      - name: Build native release binary
        run: |
          set -euo pipefail
          export KOB_CPP_ROOT="$GITHUB_WORKSPACE/src/cpp"
          export KABSD_CPP_ROOT="$KOB_CPP_ROOT"
          export KABSD_BUILD_PREFIX=KOB
          export KABSD_CMAKE_VAR_PREFIX=KB
          export INF_CMAKE_CACHE_ARGS_JSON='{"KB_BUILD_TESTS":"ON"}'
          export KOG_CMAKE_CACHE_ARGS_JSON='{"KB_BUILD_TESTS":"ON"}'

          case "$KANO_PLATFORM" in
            windows-x64)
              bash src/cpp/build/script/windows/build_windows_ninja_msvc_release.sh
              ;;
            windows-arm64)
              source src/cpp/build/script/common/windows_preset_build.sh
              kabsd_run_windows_preset windows-ninja-msvc-arm64 windows-ninja-msvc-arm64-release amd64_arm64
              ;;
            linux-x64|linux-arm64)
              bash src/cpp/build/script/linux/build_linux_ninja_clang_release.sh
              ;;
            macos-x64)
              bash src/cpp/build/script/macos/build_macos_ninja_clang_x64_release.sh
              ;;
            macos-arm64)
              bash src/cpp/build/script/macos/build_macos_ninja_clang_arm64_release.sh
              ;;
          esac

      - name: Run native smoke tests
        if: env.KANO_RUN_NATIVE_TESTS == 'true'
        run: |
          set -euo pipefail
          source .kano/cloud-report-env.sh
          mkdir -p "$KANO_TEST_REPORT_DIR" "$KANO_BDD_METADATA_DIR"
          test_preset=""
          case "$KANO_PLATFORM" in
            windows-x64)
              test_preset=windows-ninja-msvc
              ;;
            windows-arm64)
              test_preset=windows-ninja-msvc-arm64
              ;;
            linux-x64|linux-arm64)
              test_preset=linux-ninja-clang
              ;;
            macos-x64)
              test_preset=macos-ninja-clang-x64
              ;;
            macos-arm64)
              test_preset=macos-ninja-clang-arm64
              ;;
          esac
          export KANO_TEST_COMMAND="bash src/shell/test/native-test.sh $test_preset Release"
          bash src/shell/test/native-test.sh "$test_preset" Release
          tool_suffix=""
          [[ "$KANO_PLATFORM" == windows-* ]] && tool_suffix=".exe"
          tool_path="src/cpp/out/bin/$test_preset/release/kano-cpp-infra-tool${tool_suffix}"
          if [[ -f "$KANO_TEST_XML" && -x "$tool_path" ]]; then
            "$tool_path" generate-bdd-metadata "$KANO_TEST_XML" "$KANO_BDD_METADATA_DIR" "kano-agent-backlog-native-tests"
          elif [[ -f "$KANO_TEST_XML" ]]; then
            echo "::warning::kano-cpp-infra-tool not found for BDD metadata generation: $tool_path"
          fi

      - name: Run native coverage
        if: env.KANO_RUN_COVERAGE == 'true'
        continue-on-error: true
        run: |
          set -euo pipefail
          source .kano/cloud-report-env.sh
          export INF_COVERAGE_ROOT="$KANO_COVERAGE_REPORT_DIR"
          export KANO_CPP_INFRA_PGO_GATHER_TEST_BINARY=backlog_core_smoke_test
          export KANO_CPP_INFRA_PGO_GATHER_TEST_FILTER=
          export KOB_CPP_ROOT="$GITHUB_WORKSPACE/src/cpp"
          export KABSD_CPP_ROOT="$KOB_CPP_ROOT"
          export KABSD_BUILD_PREFIX=KOB
          export KABSD_CMAKE_VAR_PREFIX=KB
          export INF_CMAKE_CACHE_ARGS_JSON='{"KB_BUILD_TESTS":"ON"}'
          export KANO_TEST_BINARY_NAME=cli_repo_smoke_test
          export KANO_COVERAGE_TEST_BINARY_WINDOWS=cli_repo_smoke_test.exe
          export KANO_COVERAGE_TEST_BINARY_LINUX=backlog_core_smoke_test
          export KANO_COVERAGE_TEST_BINARY_MACOS=backlog_core_smoke_test
          case "$KANO_PLATFORM" in
            linux-x64|linux-arm64)
              bash src/cpp/shared/infra/scripts/platform/linux/ci-coverage-all.sh
              ;;
            *)
              bash src/cpp/shared/infra/scripts/workflows/coverage-all.sh
              ;;
          esac

      - name: Gather native report site
        if: always() && !cancelled()
        continue-on-error: true
        run: |
          set -euo pipefail
          source .kano/cloud-report-env.sh
          export INF_COVERAGE_ROOT="$KANO_COVERAGE_REPORT_DIR"
          export KOB_CPP_ROOT="$GITHUB_WORKSPACE/src/cpp"
          export KABSD_CPP_ROOT="$KOB_CPP_ROOT"
          export KABSD_BUILD_PREFIX=KOB
          export KABSD_CMAKE_VAR_PREFIX=KB
          export INF_CMAKE_CACHE_ARGS_JSON='{"KB_BUILD_TESTS":"ON"}'
          export KANO_TEST_BINARY_NAME=cli_repo_smoke_test
          bash src/cpp/shared/infra/scripts/lib/package-reports-with-skill.sh

      - name: Normalize GitHub report artifacts
        if: always() && !cancelled()
        run: |
          set -euo pipefail
          require_junit=true
          if [[ "$KANO_RUN_PYTHON_TESTS" != "true" && "$KANO_RUN_NATIVE_TESTS" != "true" ]]; then
            require_junit=false
          fi
          bash _tools/kano-cpp-test-skill/src/shell/reports/github/normalize-github-report-artifacts.sh \
            --report-root out/reports \
            --coverage-root out/coverage \
            --report-site-root artifacts/report-sites \
            --output-root _github-reports \
            --require-junit "$require_junit" \
            --strict-coverage false
          printf '%s\n' '_github-reports' > github-report-artifact-root.txt
          cat _github-reports/summary/github-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload GitHub report artifacts
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.report_artifact_name }}
          path: |
            _github-reports/**
            github-report-artifact-root.txt
          if-no-files-found: error
          retention-days: ${{ steps.artifact.outputs.retention_days }}

      - name: Upload raw report archives
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.report_artifact_name }}-raw-archives
          path: |
            test-reports.tar.gz
            coverage-reports.tar.gz
          if-no-files-found: ignore
          retention-days: ${{ steps.artifact.outputs.retention_days }}

      - name: Upload Code Quality coverage
        if: always() && inputs.publish_code_quality_coverage == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        continue-on-error: true
        uses: actions/upload-code-coverage@v1
        with:
          files: _github-reports/coverage/**/*.xml

      - name: Package cloud artifact
        if: success()
        env:
          KANO_CLOUD_ARTIFACT_NAME: ${{ steps.artifact.outputs.artifact_name }}
        run: |
          python - <<'PY'
          import csv
          import hashlib
          import json
          import os
          import shutil
          import tarfile
          from pathlib import Path

          platform = os.environ["KANO_PLATFORM"]
          package_id = os.environ["KANO_PACKAGE_ID"]
          version = os.environ["KANO_PACKAGE_VERSION"]
          source_ref = os.environ.get("KANO_SOURCE_REF", "main")
          request_id = os.environ["KANO_REQUEST_ID"]
          required = os.environ.get("KANO_REQUIRED", "false").lower() == "true"
          experimental = os.environ.get("KANO_EXPERIMENTAL", "false").lower() == "true"
          release_mode = os.environ.get("KANO_RELEASE_MODE", "ci")
          contract = os.environ.get("KANO_ARTIFACT_CONTRACT_VERSION", "1")
          artifact_name = os.environ.get("KANO_CLOUD_ARTIFACT_NAME", "")

          def safe_component(value: str) -> str:
              text = "".join(ch if ch.isalnum() or ch in "._+-" else "-" for ch in value.strip())
              return text.strip("-") or "artifact"

          def branch_component(value: str) -> str:
              text = value.strip() or "main"
              for prefix in ("refs/heads/", "refs/remotes/origin/", "origin/"):
                  if text.startswith(prefix):
                      text = text[len(prefix):]
                      break
              if text in {"__DEFAULT_BRANCH__", "__SOURCE_BRANCH__", "__BUILD_BRANCH__"}:
                  text = "main"
              return safe_component(text)

          binary_dirs = {
              "windows-x64": Path("src/cpp/out/bin/windows-ninja-msvc/release"),
              "windows-arm64": Path("src/cpp/out/bin/windows-ninja-msvc-arm64/release"),
              "linux-x64": Path("src/cpp/out/bin/linux-ninja-clang/release"),
              "linux-arm64": Path("src/cpp/out/bin/linux-ninja-clang/release"),
              "macos-x64": Path("src/cpp/out/bin/macos-ninja-clang-x64/release"),
              "macos-arm64": Path("src/cpp/out/bin/macos-ninja-clang-arm64/release"),
          }
          bin_dir = binary_dirs[platform]
          if not bin_dir.is_dir():
              raise SystemExit(f"missing release binary directory: {bin_dir}")

          artifact_root = Path(".kano/cloud-artifact")
          payload_root = Path(".kano/cloud-payload") / safe_component(package_id)
          if artifact_root.exists():
              shutil.rmtree(artifact_root)
          if payload_root.parent.exists():
              shutil.rmtree(payload_root.parent)
          artifact_root.mkdir(parents=True)
          (artifact_root / "platform" / platform).mkdir(parents=True)
          payload_root.mkdir(parents=True)
          (payload_root / "out" / "bin").mkdir(parents=True)
          (payload_root / "scripts").mkdir(parents=True)

          for name in ["VERSION", "SKILL.md", "README.md", "LICENSE"]:
              source = Path(name)
              if source.is_file():
                  shutil.copy2(source, payload_root / name)
          for name in ["kano-backlog", "kano-backlog.bat", "kob", "kob.bat"]:
              source = Path("scripts") / name
              if source.is_file():
                  shutil.copy2(source, payload_root / "scripts" / name)
          for path in sorted(p for p in bin_dir.rglob("*") if p.is_file()):
              target = payload_root / "out" / "bin" / path.relative_to(bin_dir)
              target.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(path, target)

          archive_base = f"{safe_component(package_id)}-{safe_component(platform)}-{branch_component(source_ref)}-{safe_component(version)}-Release-cli"
          archive_path = artifact_root / (archive_base + ".tar.gz")
          entries = []
          with tarfile.open(archive_path, "w:gz") as archive:
              for path in sorted(p for p in payload_root.rglob("*") if p.is_file()):
                  arcname = path.relative_to(payload_root.parent).as_posix()
                  archive.add(path, arcname=arcname)
                  entries.append({"path": arcname, "type": "file", "size": path.stat().st_size})

          manifest_csv = artifact_root / f"{archive_path.name}.manifest.csv"
          with manifest_csv.open("w", newline="", encoding="utf-8") as handle:
              writer = csv.DictWriter(handle, fieldnames=["path", "type", "size"])
              writer.writeheader()
              writer.writerows(entries)
          manifest_summary = {
              "schemaVersion": 1,
              "sidecarKind": "kano-archive-manifest-summary",
              "archivePath": archive_path.name,
              "entryCount": len(entries),
              "totalFileSizeBytes": sum(item["size"] for item in entries),
              "sha256": hashlib.sha256(archive_path.read_bytes()).hexdigest(),
              "manifestCsv": manifest_csv.name,
          }
          (artifact_root / f"{archive_path.name}.manifest.summary.json").write_text(
              json.dumps(manifest_summary, indent=2) + "\n",
              encoding="utf-8",
          )

          report_name = f"{safe_component(package_id)}-{safe_component(platform)}"
          junit_source = Path("out") / "reports" / platform / "test-reports" / report_name / "tests.xml"
          if not junit_source.is_file():
              junit_source = Path("out/reports/test-reports/cloud/tests.xml")
          if junit_source.is_file():
              report_dest = artifact_root / "reports" / platform / "test-reports" / report_name / "tests.xml"
              report_dest.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(junit_source, report_dest)

          github_reports = Path("_github-reports")
          if github_reports.is_dir():
              shutil.copytree(github_reports, artifact_root / "_github-reports", dirs_exist_ok=True)

          files = []
          for path in sorted(p for p in artifact_root.iterdir() if p.is_file()):
              if path.name == "release-artifact-index.json":
                  continue
              data = path.read_bytes()
              files.append({
                  "path": path.name,
                  "fileName": path.name,
                  "sizeBytes": len(data),
                  "sha256": hashlib.sha256(data).hexdigest(),
                  "kind": "package-manifest" if path.name.endswith(".manifest.csv") else "package",
                  "platform": platform,
              })

          (artifact_root / "release-artifact-checksums.sha256.txt").write_text(
              "".join(f"{item['sha256']}  {item['path']}\n" for item in files),
              encoding="utf-8",
          )
          files.append({
              "path": "release-artifact-checksums.sha256.txt",
              "fileName": "release-artifact-checksums.sha256.txt",
              "sizeBytes": (artifact_root / "release-artifact-checksums.sha256.txt").stat().st_size,
              "sha256": hashlib.sha256((artifact_root / "release-artifact-checksums.sha256.txt").read_bytes()).hexdigest(),
              "kind": "checksum",
              "platform": platform,
          })
          release_index = {
              "schemaVersion": 1,
              "description": "Root-level Jenkins release artifacts, checksums, sizes, and publish classification.",
              "packageId": package_id,
              "packageVersion": version,
              "platform": platform,
              "artifacts": files,
          }
          (artifact_root / "release-artifact-index.json").write_text(json.dumps(release_index, indent=2) + "\n", encoding="utf-8")

          platform_manifest = {
              "schemaVersion": 1,
              "kind": "kano-platform-build-artifact",
              "platform": platform,
              "required": required,
              "experimental": experimental,
              "buildBackend": "github-actions",
              "backendStatus": "GITHUB_ACTIONS_BACKEND_SELECTED",
              "built": True,
              "tested": True,
              "supported": not experimental,
              "skipped": False,
              "skipReason": "",
              "message": "Built and tested by GitHub Actions cloud backend.",
              "requestId": request_id,
              "packageId": package_id,
              "packageVersion": version,
              "releaseMode": release_mode,
              "artifactContractVersion": contract,
              "githubActions": {
                  "artifactName": artifact_name,
                  "runId": os.environ.get("GITHUB_RUN_ID", ""),
                  "runAttempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
                  "repository": os.environ.get("GITHUB_REPOSITORY", ""),
                  "workflow": os.environ.get("GITHUB_WORKFLOW", ""),
              },
              "files": files,
          }
          (artifact_root / "platform" / platform / "release-artifact-manifest.json").write_text(
              json.dumps(platform_manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload cloud artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: .kano/cloud-artifact/
          if-no-files-found: error
          retention-days: ${{ steps.artifact.outputs.retention_days }}
