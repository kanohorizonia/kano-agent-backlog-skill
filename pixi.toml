[workspace]
name = "kano-agent-backlog-skill"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "linux-aarch64", "osx-64", "osx-arm64"]

[dependencies]
cmake = ">=3.21"
git = "*"
ninja = "*"
zlib = ">=1.3.2,<2"

[target.linux-64.dependencies]
bash = "*"

[target.linux-aarch64.dependencies]
bash = "*"

[target.osx-64.dependencies]
bash = "*"

[target.osx-arm64.dependencies]
bash = "*"

# =============================================================================
# Universal tasks (work on all platforms)
# =============================================================================
[tasks]
env-summary = "git --version && cmake --version && ninja --version"
native-command-coverage = "bash src/shell/test/native-command-coverage.sh"
native-runtime-gate = "bash src/shell/test/native-runtime-gate.sh"
build-release = "bash -lc 'export KOB_CPP_ROOT=src/cpp KABSD_CPP_ROOT=src/cpp KABSD_BUILD_PREFIX=KOB KABSD_CMAKE_VAR_PREFIX=KB INF_CMAKE_CACHE_ARGS_JSON=\"{\\\"KB_BUILD_TESTS\\\":\\\"ON\\\"}\"; cd src/cpp/shared/infra; pixi run build-release'"
quick-test = "bash -lc 'export KOB_CPP_ROOT=src/cpp KABSD_CPP_ROOT=src/cpp KABSD_BUILD_PREFIX=KOB KABSD_CMAKE_VAR_PREFIX=KB INF_CMAKE_CACHE_ARGS_JSON=\"{\\\"KB_BUILD_TESTS\\\":\\\"ON\\\"}\" KANO_TEST_BINARY_NAME=cli_quick_smoke_test; pixi run --manifest-path src/cpp/shared/infra/pixi.toml quick-test -- \"$@\"' --"
full-test = "bash -lc 'export KOB_CPP_ROOT=src/cpp KABSD_CPP_ROOT=src/cpp KABSD_BUILD_PREFIX=KOB KABSD_CMAKE_VAR_PREFIX=KB INF_CMAKE_CACHE_ARGS_JSON=\"{\\\"KB_BUILD_TESTS\\\":\\\"ON\\\"}\" KANO_TEST_BINARY_NAME=cli_repo_smoke_test; pixi run --manifest-path src/cpp/shared/infra/pixi.toml full-test -- \"$@\"' --"
test-report = "bash -lc 'export KOB_CPP_ROOT=src/cpp KABSD_CPP_ROOT=src/cpp KABSD_BUILD_PREFIX=KOB KABSD_CMAKE_VAR_PREFIX=KB INF_CMAKE_CACHE_ARGS_JSON=\"{\\\"KB_BUILD_TESTS\\\":\\\"ON\\\"}\" KANO_TEST_BINARY_NAME=cli_repo_smoke_test; pixi run --manifest-path src/cpp/shared/infra/pixi.toml test-report'"
coverage-report = "bash -lc 'export KOB_CPP_ROOT=src/cpp KABSD_CPP_ROOT=src/cpp KABSD_BUILD_PREFIX=KOB KABSD_CMAKE_VAR_PREFIX=KB INF_CMAKE_CACHE_ARGS_JSON=\"{\\\"KB_BUILD_TESTS\\\":\\\"ON\\\"}\" KANO_TEST_BINARY_NAME=cli_repo_smoke_test KANO_COVERAGE_TEST_BINARY_WINDOWS=cli_repo_smoke_test.exe KANO_COVERAGE_TEST_BINARY_LINUX=cli_repo_smoke_test KANO_COVERAGE_TEST_BINARY_MACOS=cli_repo_smoke_test; pixi run --manifest-path src/cpp/shared/infra/pixi.toml coverage-report'"
coverage-all = "bash -lc 'export KOB_CPP_ROOT=src/cpp KABSD_CPP_ROOT=src/cpp KABSD_BUILD_PREFIX=KOB KABSD_CMAKE_VAR_PREFIX=KB INF_CMAKE_CACHE_ARGS_JSON=\"{\\\"KB_BUILD_TESTS\\\":\\\"ON\\\"}\" KANO_TEST_BINARY_NAME=cli_repo_smoke_test KANO_COVERAGE_TEST_BINARY_WINDOWS=cli_repo_smoke_test.exe KANO_COVERAGE_TEST_BINARY_LINUX=cli_repo_smoke_test KANO_COVERAGE_TEST_BINARY_MACOS=cli_repo_smoke_test; pixi run --manifest-path src/cpp/shared/infra/pixi.toml coverage-all'"
gather-reports = "bash -lc 'export KOB_CPP_ROOT=src/cpp KABSD_CPP_ROOT=src/cpp KABSD_BUILD_PREFIX=KOB KABSD_CMAKE_VAR_PREFIX=KB INF_CMAKE_CACHE_ARGS_JSON=\"{\\\"KB_BUILD_TESTS\\\":\\\"ON\\\"}\" KANO_TEST_BINARY_NAME=cli_repo_smoke_test KANO_COVERAGE_TEST_BINARY_WINDOWS=cli_repo_smoke_test.exe KANO_COVERAGE_TEST_BINARY_LINUX=cli_repo_smoke_test KANO_COVERAGE_TEST_BINARY_MACOS=cli_repo_smoke_test; pixi run --manifest-path src/cpp/shared/infra/pixi.toml gather-reports'"
pgi-build = "bash -lc 'export KOB_CPP_ROOT=src/cpp KABSD_CPP_ROOT=src/cpp KABSD_BUILD_PREFIX=KOB KABSD_CMAKE_VAR_PREFIX=KB INF_CMAKE_CACHE_ARGS_JSON=\"{\\\"KB_BUILD_TESTS\\\":\\\"ON\\\"}\"; cd src/cpp/shared/infra; pixi run pgi-build'"
profile-gather = "bash -lc 'export KOB_CPP_ROOT=src/cpp KABSD_CPP_ROOT=src/cpp KABSD_BUILD_PREFIX=KOB KABSD_CMAKE_VAR_PREFIX=KB INF_CMAKE_CACHE_ARGS_JSON=\"{\\\"KB_BUILD_TESTS\\\":\\\"ON\\\"}\" KANO_TEST_BINARY_NAME=cli_repo_smoke_test; pixi run --manifest-path src/cpp/shared/infra/pixi.toml profile-gather'"
pgo-build = "bash -lc 'export KOB_CPP_ROOT=src/cpp KABSD_CPP_ROOT=src/cpp KABSD_BUILD_PREFIX=KOB KABSD_CMAKE_VAR_PREFIX=KB INF_CMAKE_CACHE_ARGS_JSON=\"{\\\"KB_BUILD_TESTS\\\":\\\"ON\\\"}\"; cd src/cpp/shared/infra; pixi run pgo-build'"
pgo-test = "bash -lc 'export KOB_CPP_ROOT=src/cpp KABSD_CPP_ROOT=src/cpp KABSD_BUILD_PREFIX=KOB KABSD_CMAKE_VAR_PREFIX=KB INF_CMAKE_CACHE_ARGS_JSON=\"{\\\"KB_BUILD_TESTS\\\":\\\"ON\\\"}\" KANO_TEST_BINARY_NAME=cli_repo_smoke_test; pixi run --manifest-path src/cpp/shared/infra/pixi.toml pgo-test'"
pgo-rebuild = "bash -lc 'export KOB_CPP_ROOT=src/cpp KABSD_CPP_ROOT=src/cpp KABSD_BUILD_PREFIX=KOB KABSD_CMAKE_VAR_PREFIX=KB INF_CMAKE_CACHE_ARGS_JSON=\"{\\\"KB_BUILD_TESTS\\\":\\\"ON\\\"}\" KANO_TEST_BINARY_NAME=cli_repo_smoke_test; pixi run --manifest-path src/cpp/shared/infra/pixi.toml pgo-rebuild'"
pgo-gather-with-coverage = "bash -lc 'export KOB_CPP_ROOT=src/cpp KABSD_CPP_ROOT=src/cpp KABSD_BUILD_PREFIX=KOB KABSD_CMAKE_VAR_PREFIX=KB INF_CMAKE_CACHE_ARGS_JSON=\"{\\\"KB_BUILD_TESTS\\\":\\\"ON\\\"}\" KANO_TEST_BINARY_NAME=cli_repo_smoke_test; pixi run --manifest-path src/cpp/shared/infra/pixi.toml pgo-gather-with-coverage'"
ci-linux-build = "cd src/cpp/shared/infra && pixi run ci-linux-build"
ci-linux-pgi-build = "cd src/cpp/shared/infra && pixi run ci-linux-pgi-build"
ci-linux-profile-gather = "cd src/cpp/shared/infra && pixi run ci-linux-profile-gather"
ci-linux-pgo-build = "cd src/cpp/shared/infra && pixi run ci-linux-pgo-build"
ci-linux-pgo-test = "cd src/cpp/shared/infra && pixi run ci-linux-pgo-test"
ci-linux-quick-test = "cd src/cpp/shared/infra && pixi run ci-linux-quick-test"
ci-linux-test-report = "cd src/cpp/shared/infra && pixi run ci-linux-test-report"
ci-linux-coverage-all = "cd src/cpp/shared/infra && pixi run ci-linux-coverage-all"
ci-linux-validate = "cd src/cpp/shared/infra && pixi run ci-linux-validate"
ci-linux-export = "cd src/cpp/shared/infra && pixi run ci-linux-export"
webview-compose-build = "docker compose -f docker-compose.webview.yml build webview"
webview-compose-up = "docker compose -f docker-compose.webview.yml up --build webview"
webview-compose-up-detached = "docker compose -f docker-compose.webview.yml up -d --build webview"
webview-compose-down = "docker compose -f docker-compose.webview.yml down"
webview-compose-logs = "docker compose -f docker-compose.webview.yml logs -f webview"

# =============================================================================
# Windows-specific (win-64)
# =============================================================================
[target.win-64.tasks]
# Development build (Debug preset - fast iteration)
build = "KOB_CPP_ROOT=src/cpp KABSD_BUILD_PREFIX=KOB KABSD_CMAKE_VAR_PREFIX=KB bash src/cpp/shared/infra/scripts/platform/win64/ninja-msvc-debug.sh"
build-dev = "KOB_CPP_ROOT=src/cpp KABSD_BUILD_PREFIX=KOB KABSD_CMAKE_VAR_PREFIX=KB bash src/cpp/shared/infra/scripts/platform/win64/ninja-msvc-debug.sh"
build-dev-win = "KOB_CPP_ROOT=src/cpp KABSD_BUILD_PREFIX=KOB KABSD_CMAKE_VAR_PREFIX=KB bash src/cpp/shared/infra/scripts/platform/win64/ninja-msvc-debug.sh"
build-webview = "KOB_CPP_ROOT=src/cpp KABSD_BUILD_PREFIX=KOB KABSD_CMAKE_VAR_PREFIX=KB INF_CMAKE_CACHE_ARGS_JSON='{\"KB_BUILD_WEBVIEW\":\"ON\"}' bash src/cpp/shared/infra/scripts/platform/win64/ninja-msvc-debug.sh"
build-webview-release = "KOB_CPP_ROOT=src/cpp KABSD_BUILD_PREFIX=KOB KABSD_CMAKE_VAR_PREFIX=KB INF_CMAKE_CACHE_ARGS_JSON='{\"KB_BUILD_WEBVIEW\":\"ON\"}' bash src/cpp/shared/infra/scripts/platform/win64/ninja-msvc-release.sh"
webview-serve = "bash scripts/kob webview serve --backlog-root ../_kano/backlog --port 8799"
webview-open = "powershell -NoProfile -Command Start-Process http://127.0.0.1:8799"
webview = "pixi run build-webview && pixi run webview-serve"
webview-release = "pixi run build-webview-release && pixi run webview-serve"
