name: Kano Cloud Build

run-name: kano-cloud-build ${{ inputs.request_id }} ${{ inputs.platform }}

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: Jenkins request identifier.
        required: true
        type: string
      package_id:
        description: Package identifier used in artifact names.
        required: true
        type: string
      package_version:
        description: Package version.
        required: true
        type: string
      platform:
        description: Target platform.
        required: true
        type: choice
        options:
          - windows-x64
          - windows-arm64
          - linux-x64
          - linux-arm64
          - macos-x64
          - macos-arm64
      source_commit:
        description: Source commit expected by Jenkins.
        required: false
        default: HEAD
        type: string
      source_ref:
        description: Source ref to checkout.
        required: false
        default: main
        type: string
      release_mode:
        description: ci or release.
        required: false
        default: ci
        type: string
      artifact_contract_version:
        description: Artifact manifest contract version.
        required: false
        default: "1"
        type: string
      retention_days:
        description: Temporary artifact retention days.
        required: false
        default: "1"
        type: string
      required:
        description: Whether this platform is release-blocking.
        required: false
        default: "false"
        type: string
      experimental:
        description: Whether this platform is experimental.
        required: false
        default: "false"
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: kano-cloud-build-${{ inputs.request_id }}-${{ inputs.platform }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ fromJSON('{"windows-x64":"windows-2025","windows-arm64":"windows-11-arm","linux-x64":"ubuntu-24.04","linux-arm64":"ubuntu-24.04-arm","macos-x64":"macos-15-intel","macos-arm64":"macos-15"}')[inputs.platform] }}
    timeout-minutes: 90
    defaults:
      run:
        shell: bash
    env:
      KANO_PLATFORM: ${{ inputs.platform }}
      KANO_PACKAGE_ID: ${{ inputs.package_id }}
      KANO_PACKAGE_VERSION: ${{ inputs.package_version }}
      KANO_REQUEST_ID: ${{ inputs.request_id }}
      KANO_SOURCE_COMMIT: ${{ inputs.source_commit }}
      KANO_SOURCE_REF: ${{ inputs.source_ref }}
      KANO_RELEASE_MODE: ${{ inputs.release_mode }}
      KANO_ARTIFACT_CONTRACT_VERSION: ${{ inputs.artifact_contract_version }}
      KANO_REQUIRED: ${{ inputs.required }}
      KANO_EXPERIMENTAL: ${{ inputs.experimental }}
      KANO_BACKLOG_NONINTERACTIVE: "1"
      KANO_TEST_NONINTERACTIVE: "1"
      GIT_TERMINAL_PROMPT: "0"

    steps:
      - name: Validate request
        run: |
          set -euo pipefail
          case "$KANO_PLATFORM" in
            windows-x64|windows-arm64|linux-x64|linux-arm64|macos-x64|macos-arm64) ;;
            *) echo "Unsupported platform: $KANO_PLATFORM" >&2; exit 2 ;;
          esac
          case "$KANO_ARTIFACT_CONTRACT_VERSION" in
            1) ;;
            *) echo "Unsupported artifact contract version: $KANO_ARTIFACT_CONTRACT_VERSION" >&2; exit 2 ;;
          esac

      - name: Resolve cloud artifact metadata
        id: artifact
        run: |
          set -euo pipefail
          safe_package="$(printf '%s' "$KANO_PACKAGE_ID" | sed -E 's/[^A-Za-z0-9._-]+/-/g; s/^-|-$//g')"
          [ -n "$safe_package" ] || safe_package="artifact"
          retention_days="${{ inputs.retention_days }}"
          case "$retention_days" in ''|*[!0-9]*) retention_days=1 ;; esac
          [ "$retention_days" -lt 1 ] && retention_days=1
          [ "$retention_days" -gt 3 ] && retention_days=3
          {
            echo "artifact_name=${safe_package}-${KANO_PLATFORM}-${KANO_REQUEST_ID}"
            echo "retention_days=$retention_days"
          } >> "$GITHUB_OUTPUT"

      - name: Create kanohorizonia Jenkins app token
        id: jenkins-app-token
        if: ${{ vars.KANO_JENKINS_APP_CLIENT_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.KANO_JENKINS_APP_CLIENT_ID }}
          private-key: ${{ secrets.KANO_JENKINS_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            kano-agent-backlog-skill
            kano-cpp-infra
            kano-cpp-test-skill
          permission-contents: read

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.jenkins-app-token.outputs.token || github.token }}
          persist-credentials: false

      - name: Checkout requested commit
        run: |
          set -euo pipefail
          if [[ -n "$KANO_SOURCE_COMMIT" && "$KANO_SOURCE_COMMIT" != "HEAD" ]]; then
            git checkout --detach "$KANO_SOURCE_COMMIT"
          fi

      - name: Checkout kano-cpp-test-skill
        uses: actions/checkout@v4
        with:
          repository: kanohorizonia/kano-cpp-test-skill
          ref: main
          path: _tools/kano-cpp-test-skill
          token: ${{ steps.jenkins-app-token.outputs.token || github.token }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup .NET SDK
        if: startsWith(inputs.platform, 'windows-')
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.14

      - name: Install prerequisites
        run: |
          set -euo pipefail
          case "$KANO_PLATFORM" in
            linux-*)
              sudo apt-get update
              sudo apt-get install -y clang ninja-build build-essential cmake
              ;;
            macos-*)
              brew list cmake >/dev/null 2>&1 || brew install cmake
              brew list ninja >/dev/null 2>&1 || brew install ninja
              ;;
            windows-*)
              choco install ninja cmake -y --no-progress || true
              ;;
          esac
          pixi install --manifest-path pixi.toml || true
          pixi install --manifest-path src/cpp/shared/infra/pixi.toml || true

      - name: Build native release binary
        run: |
          set -euo pipefail
          export KOB_CPP_ROOT="$GITHUB_WORKSPACE/src/cpp"
          export KABSD_CPP_ROOT="$KOB_CPP_ROOT"
          export KABSD_BUILD_PREFIX=KOB
          export KABSD_CMAKE_VAR_PREFIX=KB
          export INF_CMAKE_CACHE_ARGS_JSON='{"KB_BUILD_TESTS":"ON"}'
          export KOG_CMAKE_CACHE_ARGS_JSON='{"KB_BUILD_TESTS":"ON"}'

          case "$KANO_PLATFORM" in
            windows-x64)
              bash src/cpp/build/script/windows/build_windows_ninja_msvc_release.sh
              ;;
            windows-arm64)
              source src/cpp/build/script/common/windows_preset_build.sh
              kabsd_run_windows_preset windows-ninja-msvc-arm64 windows-ninja-msvc-arm64-release amd64_arm64
              ;;
            linux-x64|linux-arm64)
              bash src/cpp/build/script/linux/build_linux_ninja_clang_release.sh
              ;;
            macos-x64)
              bash src/cpp/build/script/macos/build_macos_ninja_clang_x64_release.sh
              ;;
            macos-arm64)
              bash src/cpp/build/script/macos/build_macos_ninja_clang_arm64_release.sh
              ;;
          esac

      - name: Run native smoke tests
        run: |
          set -euo pipefail
          mkdir -p out/reports/test-reports/cloud
          export KANO_TEST_XML="$GITHUB_WORKSPACE/out/reports/test-reports/cloud/tests.xml"
          case "$KANO_PLATFORM" in
            windows-x64)
              bash src/shell/test/native-test.sh windows-ninja-msvc Release
              ;;
            windows-arm64)
              bash src/shell/test/native-test.sh windows-ninja-msvc-arm64 Release
              ;;
            linux-x64|linux-arm64)
              bash src/shell/test/native-test.sh linux-ninja-clang Release
              ;;
            macos-x64)
              bash src/shell/test/native-test.sh macos-ninja-clang-x64 Release
              ;;
            macos-arm64)
              bash src/shell/test/native-test.sh macos-ninja-clang-arm64 Release
              ;;
          esac

      - name: Package cloud artifact
        env:
          KANO_CLOUD_ARTIFACT_NAME: ${{ steps.artifact.outputs.artifact_name }}
        run: |
          python - <<'PY'
          import csv
          import hashlib
          import json
          import os
          import shutil
          import tarfile
          from pathlib import Path

          platform = os.environ["KANO_PLATFORM"]
          package_id = os.environ["KANO_PACKAGE_ID"]
          version = os.environ["KANO_PACKAGE_VERSION"]
          request_id = os.environ["KANO_REQUEST_ID"]
          required = os.environ.get("KANO_REQUIRED", "false").lower() == "true"
          experimental = os.environ.get("KANO_EXPERIMENTAL", "false").lower() == "true"
          release_mode = os.environ.get("KANO_RELEASE_MODE", "ci")
          contract = os.environ.get("KANO_ARTIFACT_CONTRACT_VERSION", "1")
          artifact_name = os.environ.get("KANO_CLOUD_ARTIFACT_NAME", "")

          def safe_component(value: str) -> str:
              text = "".join(ch if ch.isalnum() or ch in "._+-" else "-" for ch in value.strip())
              return text.strip("-") or "artifact"

          binary_dirs = {
              "windows-x64": Path("src/cpp/out/bin/windows-ninja-msvc/release"),
              "windows-arm64": Path("src/cpp/out/bin/windows-ninja-msvc-arm64/release"),
              "linux-x64": Path("src/cpp/out/bin/linux-ninja-clang/release"),
              "linux-arm64": Path("src/cpp/out/bin/linux-ninja-clang/release"),
              "macos-x64": Path("src/cpp/out/bin/macos-ninja-clang-x64/release"),
              "macos-arm64": Path("src/cpp/out/bin/macos-ninja-clang-arm64/release"),
          }
          bin_dir = binary_dirs[platform]
          if not bin_dir.is_dir():
              raise SystemExit(f"missing release binary directory: {bin_dir}")

          artifact_root = Path(".kano/cloud-artifact")
          payload_root = Path(".kano/cloud-payload") / safe_component(package_id)
          if artifact_root.exists():
              shutil.rmtree(artifact_root)
          if payload_root.parent.exists():
              shutil.rmtree(payload_root.parent)
          artifact_root.mkdir(parents=True)
          (artifact_root / "platform" / platform).mkdir(parents=True)
          payload_root.mkdir(parents=True)
          (payload_root / "out" / "bin").mkdir(parents=True)
          (payload_root / "scripts").mkdir(parents=True)

          for name in ["VERSION", "SKILL.md", "README.md", "LICENSE"]:
              source = Path(name)
              if source.is_file():
                  shutil.copy2(source, payload_root / name)
          for name in ["kano-backlog", "kano-backlog.bat", "kob", "kob.bat"]:
              source = Path("scripts") / name
              if source.is_file():
                  shutil.copy2(source, payload_root / "scripts" / name)
          for path in sorted(p for p in bin_dir.rglob("*") if p.is_file()):
              target = payload_root / "out" / "bin" / path.relative_to(bin_dir)
              target.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(path, target)

          archive_base = f"{safe_component(package_id)}-{safe_component(platform)}-{safe_component(version)}-Release-cli"
          archive_path = artifact_root / (archive_base + ".tar.gz")
          entries = []
          with tarfile.open(archive_path, "w:gz") as archive:
              for path in sorted(p for p in payload_root.rglob("*") if p.is_file()):
                  arcname = path.relative_to(payload_root.parent).as_posix()
                  archive.add(path, arcname=arcname)
                  entries.append({"path": arcname, "type": "file", "size": path.stat().st_size})

          manifest_csv = artifact_root / f"{archive_path.name}.manifest.csv"
          with manifest_csv.open("w", newline="", encoding="utf-8") as handle:
              writer = csv.DictWriter(handle, fieldnames=["path", "type", "size"])
              writer.writeheader()
              writer.writerows(entries)
          manifest_summary = {
              "schemaVersion": 1,
              "sidecarKind": "kano-archive-manifest-summary",
              "archivePath": archive_path.name,
              "entryCount": len(entries),
              "totalFileSizeBytes": sum(item["size"] for item in entries),
              "sha256": hashlib.sha256(archive_path.read_bytes()).hexdigest(),
              "manifestCsv": manifest_csv.name,
          }
          (artifact_root / f"{archive_path.name}.manifest.summary.json").write_text(
              json.dumps(manifest_summary, indent=2) + "\n",
              encoding="utf-8",
          )

          junit_source = Path("out/reports/test-reports/cloud/tests.xml")
          if junit_source.is_file():
              report_dest = artifact_root / "reports" / platform / "test-reports" / f"{safe_component(package_id)}-{safe_component(platform)}" / "tests.xml"
              report_dest.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(junit_source, report_dest)

          files = []
          for path in sorted(p for p in artifact_root.iterdir() if p.is_file()):
              if path.name == "release-artifact-index.json":
                  continue
              data = path.read_bytes()
              files.append({
                  "path": path.name,
                  "fileName": path.name,
                  "sizeBytes": len(data),
                  "sha256": hashlib.sha256(data).hexdigest(),
                  "kind": "package-manifest" if path.name.endswith(".manifest.csv") else "package",
                  "platform": platform,
              })

          (artifact_root / "release-artifact-checksums.sha256.txt").write_text(
              "".join(f"{item['sha256']}  {item['path']}\n" for item in files),
              encoding="utf-8",
          )
          files.append({
              "path": "release-artifact-checksums.sha256.txt",
              "fileName": "release-artifact-checksums.sha256.txt",
              "sizeBytes": (artifact_root / "release-artifact-checksums.sha256.txt").stat().st_size,
              "sha256": hashlib.sha256((artifact_root / "release-artifact-checksums.sha256.txt").read_bytes()).hexdigest(),
              "kind": "checksum",
              "platform": platform,
          })
          release_index = {
              "schemaVersion": 1,
              "description": "Root-level Jenkins release artifacts, checksums, sizes, and publish classification.",
              "packageId": package_id,
              "packageVersion": version,
              "platform": platform,
              "artifacts": files,
          }
          (artifact_root / "release-artifact-index.json").write_text(json.dumps(release_index, indent=2) + "\n", encoding="utf-8")

          platform_manifest = {
              "schemaVersion": 1,
              "kind": "kano-platform-build-artifact",
              "platform": platform,
              "required": required,
              "experimental": experimental,
              "buildBackend": "github-actions",
              "backendStatus": "GITHUB_ACTIONS_BACKEND_SELECTED",
              "built": True,
              "tested": True,
              "supported": not experimental,
              "skipped": False,
              "skipReason": "",
              "message": "Built and tested by GitHub Actions cloud backend.",
              "requestId": request_id,
              "packageId": package_id,
              "packageVersion": version,
              "releaseMode": release_mode,
              "artifactContractVersion": contract,
              "githubActions": {
                  "artifactName": artifact_name,
                  "runId": os.environ.get("GITHUB_RUN_ID", ""),
                  "runAttempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
                  "repository": os.environ.get("GITHUB_REPOSITORY", ""),
                  "workflow": os.environ.get("GITHUB_WORKFLOW", ""),
              },
              "files": files,
          }
          (artifact_root / "platform" / platform / "release-artifact-manifest.json").write_text(
              json.dumps(platform_manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload cloud artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: .kano/cloud-artifact/
          if-no-files-found: error
          retention-days: ${{ steps.artifact.outputs.retention_days }}
