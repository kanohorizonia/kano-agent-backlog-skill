# Documentation Publishing Configuration
# Defines content mapping and navigation structure for documentation website
# Base directories:
#   source: ${REPO_ROOT}/_ws/src
#   target: ${REPO_ROOT}/_ws/build/content

navigation:
  Demo:
    title: "Demo & Examples"
    description: "Demonstration repository and usage examples"
    items:
      - source: "demo/README.md"
        target: "demo/overview.md"
        title: "Demo Overview"
      - source: "demo/AGENTS.md"
        target: "demo/agents.md"
        title: "Agent Guidelines"
      - source: "demo/CLAUDE.md"
        target: "demo/claude.md"
        title: "Claude Integration"

  Skill:
    title: "Skill Documentation"
    description: "Core skill implementation and reference"
    items:
      - source: "skill/SKILL.md"
        target: "skill/guide.md"
        title: "Skill Guide"
      - source: "skill/README.md"
        target: "skill/readme.md"
        title: "Skill README"
      - source: "skill/REFERENCE.md"
        target: "skill/reference.md"
        title: "API Reference"
      - source: "skill/CHANGELOG.md"
        target: "skill/changelog.md"
        title: "Changelog"

  Guides:
    title: "Guides"
    description: "User and operator guides from the skill repository"
    items:
      - source: "skill/docs/quick-start.md"
        target: "guides/quick-start.md"
        title: "Quick Start"
      - source: "skill/docs/agent-quick-start.md"
        target: "guides/agent-quick-start.md"
        title: "Agent Quick Start"
      - source: "skill/docs/installation.md"
        target: "guides/installation.md"
        title: "Installation"
      - source: "skill/docs/configuration.md"
        target: "guides/configuration.md"
        title: "Configuration"
      - source: "skill/docs/usage-examples.md"
        target: "guides/usage-examples.md"
        title: "Usage Examples"
      - source: "skill/docs/workset.md"
        target: "guides/workset.md"
        title: "Worksets"
      - source: "skill/docs/topic.md"
        target: "guides/topic.md"
        title: "Topics"
      - source: "skill/docs/version-policy.md"
        target: "guides/version-policy.md"
        title: "Version Policy"
      - source: "skill/docs/design/native-cli-direction.md"
        target: "guides/native-cli-direction.md"
        title: "Native CLI Direction"
      - source: "skill/docs/demo-maintenance.md"
        target: "guides/demo-maintenance.md"
        title: "Demo Maintenance"
      - source: "skill/docs/codex-for-oss.md"
        target: "guides/codex-for-oss.md"
        title: "Codex for OSS"
      - source: "skill/docs/tokenizer-quickstart.md"
        target: "guides/tokenizer-quickstart.md"
        title: "Tokenizer Quick Start"
      - source: "skill/docs/tokenizer-adapters.md"
        target: "guides/tokenizer-adapters.md"
        title: "Tokenizer Adapters"
      - source: "skill/docs/tokenizer-configuration.md"
        target: "guides/tokenizer-configuration.md"
        title: "Tokenizer Configuration"
      - source: "skill/docs/tokenizer-cli-reference.md"
        target: "guides/tokenizer-cli-reference.md"
        title: "Tokenizer CLI Reference"
      - source: "skill/docs/tokenizer-troubleshooting.md"
        target: "guides/tokenizer-troubleshooting.md"
        title: "Tokenizer Troubleshooting"
      - source: "skill/docs/tokenizer-performance.md"
        target: "guides/tokenizer-performance.md"
        title: "Tokenizer Performance"

  Automation:
    title: "Maintainer Automation"
    description: "Docs build and publishing automation for maintainers"
    items:
      - source: "skill/docs/maintainer-automation.md"
        target: "automation/maintainer-automation.md"
        title: "Maintainer Automation"
      - source: "skill/src/shell/docs/README.md"
        target: "automation/docs-pipeline.md"
        title: "Docs Pipeline"

  ADR:
    title: "Architecture Decisions"
    description: "Architecture Decision Records and design rationale"
    items:
      - source: "demo/_kano/backlog/products/kano-agent-backlog-skill/decisions/README.md"
        target: "adr/overview.md"
        title: "ADR Overview"
      - source: "demo/_kano/backlog/products/kano-agent-backlog-skill/decisions/**/*.md"
        target: "adr/"
        title_from_frontmatter: "title"
        sort_by: "id"

  Examples:
    title: "Examples & Templates"
    description: "Code examples and templates"
    items:
      - source: "skill/templates/**/*.md"
        target: "templates/"
        preserve_structure: true

  References:
    title: "Technical References"
    description: "Technical documentation and references"
    items:
      - source: "skill/references/**/*.md"
        target: "references/"
        preserve_structure: true
      - source: "skill/references/**/*.json"
        target: "references/"
        preserve_structure: true

  CLI:
    title: "CLI Reference"
    description: "Command-line interface documentation"
    items:
      - target: "cli/commands.md"
        title: "CLI Commands"

  API:
    title: "API Reference"
    description: "Native C++ API documentation"
    items:
      - target: "api/overview.md"
        title: "API Overview"
      - target: "api/mkdocs.md"
        title: "Full API Documentation"

  Releases:
    title: "Releases"
    description: "Published release notes and change history"
    items:
      - source: "skill/docs/releases/0.0.3.md"
        target: "releases/0.0.3.md"
        title: "Release 0.0.3"
      - source: "skill/docs/releases/0.0.1.md"
        target: "releases/0.0.1.md"
        title: "Release 0.0.1"
      - source: "skill/CHANGELOG.md"
        target: "releases/changelog.md"
        title: "Changelog"

# Global exclusions
exclude:
  - "docs/internal/"
  - "docs/drafts/"
  - "docs/**/*-draft.md"
  - "docs/**/*-wip.md"
  - "skill/htmlcov/"
  - "skill/.hypothesis/"
  - "skill/.kano/"
  - "skill/src/"

# Site configuration
site:
  title: "Kano Agent Backlog Skill"
  description: "AI Agent Skills for Spec-Driven Agentic Programming"
  home_page_source: "skill/docs/index.md"
  generate_indexes: true
  flatten_deep_paths: true

# MkDocs API documentation configuration
api_navigation:
  site_name: "Kano Agent Backlog Skill API"
  site_description: "Native CLI documentation for Kano Agent Backlog Skill"
  site_url: "https://agentskill-backlog.kanohorizonia.com/api-docs/"
  
  # Main page content
  home_content: |
    # Kano Agent Backlog Skill API
    
    Native C++ CLI reference for the Kano Agent Backlog Skill.
    
    ## Quick Start
    
    ```bash
    pixi run build-dev
    bash scripts/kob --help
    ```
    
    ## Native Surfaces
    
    - `scripts/kob` - repo-local launcher
    - `src/cpp/code/apps/kano_backlog_cli` - native CLI entrypoint
    - `src/cpp/code/systems/kano_backlog_core` - core data/config/frontmatter logic
    - `src/cpp/code/systems/kano_backlog_ops` - backlog operations
    
    ## Navigation
    
    Use the navigation menu to explore the complete API reference.
  
  # Navigation structure
  nav:
    - title: "Home"
      file: "index.md"
    - title: "API Reference"
      items:
        - title: "Core"
          file: "api/core.md"
        - title: "CLI"
          file: "api/cli.md"
        - title: "Operations"
          file: "api/ops.md"
