name: Release readiness gates

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  python-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python and docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install mkdocs mkdocs-material "mkdocstrings[python]" pyyaml

      - name: Version checks
        run: |
          bash src/shell/support/show-version.sh
          python -m pytest tests/test_version.py tests/test_version_management.py -q

      - name: Package build
        run: python -m build --sdist --wheel --outdir dist-test

      - name: Python regression suite
        run: bash src/shell/test/quick-test.sh

      - name: Advisory lint gate
        run: bash src/shell/test/lint.sh

      - name: Docs build
        run: bash src/shell/docs/build-and-deploy.sh --ci

  native-gates-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python for launcher fallback and tooling
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang ninja-build build-essential

      - name: Note default network assumption
        run: |
          echo "Default native presets may fetch third-party dependencies from the network."
          echo "For stricter deterministic builds, use system/submodule/vcpkg dependency modes."

      - name: Build native debug CLI
        run: bash src/shell/support/self-build.sh debug

      - name: Run native tests
        run: bash src/shell/test/native-test.sh

      - name: Verify repo-local launcher
        run: |
          bash scripts/kob --version
          bash scripts/kob doctor
