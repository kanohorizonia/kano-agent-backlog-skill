<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="320" viewBox="0 0 1080 320" role="img" aria-labelledby="title desc">
  <title id="title">Evidence chain from human intent to Done</title>
  <desc id="desc">A falsifiable evidence chain flows from human intent to acceptance criteria, bounded agent work, validation artifacts, worklog evidence, human review, and Done.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10z" fill="#334155"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .intent{fill:#ecfeff;stroke:#0891b2}
      .acceptance{fill:#fef9c3;stroke:#ca8a04}
      .work{fill:#eef2ff;stroke:#4f46e5}
      .evidence{fill:#f0fdf4;stroke:#16a34a}
      .review{fill:#fff7ed;stroke:#ea580c}
      .done{fill:#dcfce7;stroke:#15803d}
      .box{stroke-width:2.5}
      .title{font:700 26px Arial,sans-serif;fill:#0f172a}
      .text{font:700 17px Arial,sans-serif;fill:#0f172a}
      .small{font:500 13px Arial,sans-serif;fill:#475569}
      .line{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1080" height="320" class="bg"/>
  <text x="48" y="50" class="title">Claim-driven evidence chain</text>
  <text x="48" y="76" class="small">Done is reviewable only when each claim is tied to evidence that could fail.</text>
  <g transform="translate(34 128)">
    <rect x="0" y="0" width="132" height="78" rx="14" class="box intent"/>
    <text x="66" y="31" text-anchor="middle" class="text">Human</text>
    <text x="66" y="53" text-anchor="middle" class="small">intent</text>
    <path d="M144 39 H178" class="line"/>
    <rect x="190" y="0" width="138" height="78" rx="14" class="box acceptance"/>
    <text x="259" y="29" text-anchor="middle" class="text">Falsifiable</text>
    <text x="259" y="52" text-anchor="middle" class="small">acceptance</text>
    <path d="M340 39 H374" class="line"/>
    <rect x="386" y="0" width="132" height="78" rx="14" class="box work"/>
    <text x="452" y="29" text-anchor="middle" class="text">Bounded</text>
    <text x="452" y="52" text-anchor="middle" class="small">agent work</text>
    <path d="M530 39 H564" class="line"/>
    <rect x="576" y="0" width="132" height="78" rx="14" class="box evidence"/>
    <text x="642" y="29" text-anchor="middle" class="text">Validation</text>
    <text x="642" y="52" text-anchor="middle" class="small">artifact</text>
    <path d="M720 39 H754" class="line"/>
    <rect x="766" y="0" width="132" height="78" rx="14" class="box evidence"/>
    <text x="832" y="29" text-anchor="middle" class="text">Worklog</text>
    <text x="832" y="52" text-anchor="middle" class="small">evidence</text>
    <path d="M910 39 H944" class="line"/>
    <rect x="956" y="-23" width="90" height="54" rx="12" class="box review"/>
    <text x="1001" y="10" text-anchor="middle" class="small">human</text>
    <text x="1001" y="27" text-anchor="middle" class="small">review</text>
    <path d="M1001 43 V73" class="line"/>
    <rect x="956" y="86" width="90" height="54" rx="12" class="box done"/>
    <text x="1001" y="119" text-anchor="middle" class="text">Done</text>
  </g>
  <text x="48" y="278" class="small">Unfalsifiable statements stay labeled as planned, hypothesis, design intent, opinion, or future work.</text>
</svg>
