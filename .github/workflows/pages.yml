name: KanoAgentSkills / Publish Pages

run-name: ${{ format('GitHub_publish-pages_{0}_{1}_{2}', github.event.repository.name, github.ref_name, github.run_number) }}

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "src/shell/docs/**"
      - "README.md"
      - "REFERENCE.md"
      - "CHANGELOG.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure gh-pages branch push auth
        env:
          GH_PAGES_TOKEN: ${{ github.token }}
        run: |
          git config --global url."https://x-access-token:${GH_PAGES_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Build and publish gh-pages branch
        run: bash src/shell/docs/build-and-deploy.sh --ci --prep-deploy --push
