# Template process profile. Copy and edit, then point config.process.path to it.
id = "custom/your-process-id"
name = "Custom Process"
description = "Describe the intent and scope for this process profile."
default_state = "Proposed"
states = [
    "Proposed",
    "Planned",
    "Ready",
    "InProgress",
    "Review",
    "Blocked",
    "Done",
    "Duplicate",
    "Dropped"
]
terminal_states = ["Done", "Duplicate", "Dropped"]

[[work_item_types]]
type = "Initiative"
slug = "initiative"

[[work_item_types]]
type = "Epic"
slug = "epic"

[[work_item_types]]
type = "Feature"
slug = "feature"

[[work_item_types]]
type = "UserStory"
slug = "userstory"

[[work_item_types]]
type = "Task"
slug = "task"

[[work_item_types]]
type = "Bug"
slug = "bug"

[[work_item_types]]
type = "Issue"
slug = "issue"

[transitions]
Proposed = ["Planned", "Duplicate", "Dropped"]
Planned = ["Ready", "Duplicate", "Dropped"]
Ready = ["InProgress", "Duplicate", "Dropped"]
InProgress = ["Review", "Blocked", "Duplicate", "Dropped"]
Review = ["Done", "InProgress"]
Blocked = ["InProgress", "Duplicate", "Dropped"]
Done = []
Duplicate = []
Dropped = []
