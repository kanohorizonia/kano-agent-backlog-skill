name: Kano cloud build

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: Jenkins request id used to correlate the workflow run.
        required: true
        type: string
      package_id:
        description: Package identifier used in artifact names.
        required: true
        type: string
      package_version:
        description: Package version used in artifact names and manifests.
        required: true
        type: string
      platform:
        description: Kano platform id such as linux-x64.
        required: true
        type: string
      source_commit:
        description: Source commit to build.
        required: false
        default: HEAD
        type: string
      source_ref:
        description: Source ref used by Jenkins dispatch.
        required: false
        default: main
        type: string
      release_mode:
        description: ci or release.
        required: false
        default: ci
        type: string
      artifact_contract_version:
        description: Artifact contract schema version.
        required: false
        default: "1"
        type: string
      retention_days:
        description: Temporary artifact retention days.
        required: false
        default: "1"
        type: string
      required:
        description: Whether this platform is release blocking.
        required: false
        default: "false"
        type: string
      experimental:
        description: Whether this platform is experimental.
        required: false
        default: "false"
        type: string

permissions:
  contents: read
  actions: read

run-name: Kano cloud build ${{ inputs.platform }} ${{ inputs.request_id }}

jobs:
  linux-x64:
    if: ${{ inputs.platform == 'linux-x64' }}
    runs-on: ubuntu-24.04
    env:
      PLATFORM: ${{ inputs.platform }}
      PACKAGE_ID: ${{ inputs.package_id }}
      PACKAGE_VERSION: ${{ inputs.package_version }}
      REQUEST_ID: ${{ inputs.request_id }}
      RELEASE_MODE: ${{ inputs.release_mode }}
      REQUIRED: ${{ inputs.required }}
      EXPERIMENTAL: ${{ inputs.experimental }}
      ARTIFACT_CONTRACT_VERSION: ${{ inputs.artifact_contract_version }}
      KANO_BACKLOG_NONINTERACTIVE: "1"
      KANO_TEST_NONINTERACTIVE: "1"
      GIT_TERMINAL_PROMPT: "0"
    steps:
      - name: Create kanohorizonia Jenkins app token
        id: jenkins-app-token
        if: ${{ vars.KANO_JENKINS_APP_CLIENT_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.KANO_JENKINS_APP_CLIENT_ID }}
          private-key: ${{ secrets.KANO_JENKINS_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            kano-agent-backlog-skill
            kano-cpp-infra
          permission-contents: read

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0
          submodules: false
          token: ${{ steps.jenkins-app-token.outputs.token || github.token }}
          persist-credentials: false

      - name: Checkout requested commit
        if: ${{ inputs.source_commit != '' && inputs.source_commit != 'HEAD' }}
        run: git checkout --force "${{ inputs.source_commit }}"

      - name: Resolve cloud artifact metadata
        id: artifact
        shell: bash
        run: |
          set -euo pipefail

          safe_component() {
            printf '%s' "$1" |
              sed -E 's/[^A-Za-z0-9._-]+/-/g; s/-+/-/g; s/^-|-$//g'
          }

          safe_package="$(safe_component "$PACKAGE_ID")"
          if [ -z "$safe_package" ]; then
            safe_package="artifact"
          fi

          retention_days="${INPUT_RETENTION_DAYS:-1}"
          case "$retention_days" in
            ''|*[!0-9]*) retention_days=1 ;;
          esac
          if [ "$retention_days" -lt 1 ]; then
            retention_days=1
          elif [ "$retention_days" -gt 3 ]; then
            retention_days=3
          fi

          {
            echo "artifact_name=${safe_package}-${PLATFORM}-${REQUEST_ID}"
            echo "retention_days=$retention_days"
          } >> "$GITHUB_OUTPUT"
        env:
          INPUT_RETENTION_DAYS: ${{ inputs.retention_days }}

      - name: Initialize native infra dependency
        id: dependency
        shell: bash
        env:
          ARTIFACT_NAME: ${{ steps.artifact.outputs.artifact_name }}
          KANO_GITHUB_READ_TOKEN: ${{ steps.jenkins-app-token.outputs.token || secrets.KANO_GITHUB_READ_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "${KANO_GITHUB_READ_TOKEN:-}" ]; then
            echo "::add-mask::$KANO_GITHUB_READ_TOKEN"
            auth_header="$(printf 'x-access-token:%s' "$KANO_GITHUB_READ_TOKEN" | base64 -w0)"
            echo "::add-mask::$auth_header"
            git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic $auth_header"
          fi

          if git submodule update --init --force --recursive; then
            git config --global --unset-all http.https://github.com/.extraheader || true
            echo "dependency_available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config --global --unset-all http.https://github.com/.extraheader || true

          echo "dependency_available=false" >> "$GITHUB_OUTPUT"
          mkdir -p ".kano/cloud-artifact/platform/$PLATFORM"
          python3 - "$PLATFORM" "$PACKAGE_ID" "$PACKAGE_VERSION" "$REQUEST_ID" "$ARTIFACT_NAME" "$RELEASE_MODE" "$REQUIRED" "$EXPERIMENTAL" <<'PY'
          import json
          import pathlib
          import sys

          platform = sys.argv[1]
          package_id = sys.argv[2]
          package_version = sys.argv[3]
          request_id = sys.argv[4]
          artifact_name = sys.argv[5]
          release_mode = sys.argv[6]
          required = sys.argv[7].lower() == "true"
          experimental = sys.argv[8].lower() == "true"
          root = pathlib.Path(".kano/cloud-artifact")
          message = (
              "Private dependency submodule src/cpp/shared/infra could not be fetched. "
              "Configure the kanohorizonia-jenkins GitHub App credentials as "
              "KANO_JENKINS_APP_CLIENT_ID and KANO_JENKINS_APP_PRIVATE_KEY, configure "
              "the fallback KANO_GITHUB_READ_TOKEN repository secret with read access "
              "to kanohorizonia/kano-cpp-infra, or make that dependency public."
          )
          platform_manifest = {
              "schemaVersion": 1,
              "kind": "kano-platform-build-artifact",
              "platform": platform,
              "required": required,
              "experimental": experimental,
              "buildBackend": "none",
              "backendStatus": "REQUIRED_PLATFORM_BACKEND_UNAVAILABLE" if required else "SKIPPED_BACKEND_UNAVAILABLE",
              "built": False,
              "tested": False,
              "supported": False,
              "skipped": True,
              "skipReason": "BACKEND_UNAVAILABLE",
              "message": message,
              "requestId": request_id,
              "packageId": package_id,
              "packageVersion": package_version,
              "releaseMode": release_mode,
              "githubActions": {
                  "artifactName": artifact_name,
                  "dependencyAvailable": False,
                  "repository": "${{ github.repository }}",
                  "workflow": "${{ github.workflow }}",
                  "runId": "${{ github.run_id }}",
              },
              "files": [],
          }
          (root / "platform" / platform / "release-artifact-manifest.json").write_text(
              json.dumps(platform_manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          release_manifest = {
              "schemaVersion": 1,
              "kind": "kano-release-artifacts",
              "packageId": package_id,
              "packageVersion": package_version,
              "platform": platform,
              "files": [],
              "skipped": True,
              "skipReason": "BACKEND_UNAVAILABLE",
              "message": message,
          }
          (root / "release-artifacts.manifest.json").write_text(
              json.dumps(release_manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

          if [ "${REQUIRED,,}" = "true" ]; then
            exit 1
          fi

      - name: Install native build dependencies
        if: ${{ steps.dependency.outputs.dependency_available == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y clang ninja-build build-essential cmake

      - name: Build native release CLI
        if: ${{ steps.dependency.outputs.dependency_available == 'true' }}
        run: bash src/shell/support/self-build.sh release

      - name: Run native quick tests
        if: ${{ steps.dependency.outputs.dependency_available == 'true' }}
        run: bash src/shell/test/quick-test.sh linux-ninja-clang Release

      - name: Prepare cloud artifact
        if: ${{ steps.dependency.outputs.dependency_available == 'true' }}
        shell: bash
        env:
          ARTIFACT_NAME: ${{ steps.artifact.outputs.artifact_name }}
        run: |
          set -euo pipefail

          safe_component() {
            printf '%s' "$1" |
              sed -E 's/[^A-Za-z0-9._-]+/-/g; s/-+/-/g; s/^-|-$//g'
          }

          safe_package="$(safe_component "$PACKAGE_ID")"
          if [ -z "$safe_package" ]; then
            safe_package="artifact"
          fi

          artifact_name="$ARTIFACT_NAME"
          archive_base="${safe_package}_${PACKAGE_VERSION}_${PLATFORM}"
          artifact_root=".kano/cloud-artifact"
          payload_root=".kano/cloud-payload/${safe_package}"

          rm -rf "$artifact_root" ".kano/cloud-payload"
          mkdir -p "$artifact_root/platform/$PLATFORM" "$payload_root"

          cp -f VERSION SKILL.md README.md LICENSE "$payload_root/"
          mkdir -p "$payload_root/scripts"
          cp -f scripts/kano-backlog scripts/kob "$payload_root/scripts/"

          bin_source=""
          for candidate in \
            "src/cpp/out/bin/linux-ninja-clang/release" \
            "src/cpp/out/bin/linux-ninja-clang/Release" \
            "src/cpp/out/bin/linux-ninja-clang-release/release" \
            "src/cpp/out/bin/linux-ninja-clang-release/Release"
          do
            if [ -d "$candidate" ]; then
              bin_source="$candidate"
              break
            fi
          done
          if [ -z "$bin_source" ]; then
            echo "Native release binary output was not found under src/cpp/out/bin." >&2
            find src/cpp/out -maxdepth 5 -type f -perm -111 -print 2>/dev/null || true
            exit 2
          fi

          mkdir -p "$payload_root/out/bin"
          cp -a "$bin_source/." "$payload_root/out/bin/"

          tar_path="$artifact_root/${archive_base}.tar.gz"
          tar -C ".kano/cloud-payload" -czf "$tar_path" "$safe_package"

          manifest_csv="$artifact_root/${archive_base}.tar.gz.manifest.csv"
          python3 - "$tar_path" "$manifest_csv" <<'PY'
          import csv
          import sys
          import tarfile

          tar_path, manifest_path = sys.argv[1:3]
          with tarfile.open(tar_path, "r:gz") as tar, open(manifest_path, "w", newline="", encoding="utf-8") as handle:
              writer = csv.writer(handle)
              writer.writerow(["path", "type", "size", "mode"])
              for member in sorted(tar.getmembers(), key=lambda item: item.name):
                  kind = "file" if member.isfile() else "directory" if member.isdir() else "other"
                  writer.writerow([member.name, kind, member.size, oct(member.mode)])
          PY

          sha_file="$artifact_root/release-artifacts.sha256.txt"
          (cd "$artifact_root" && sha256sum "$(basename "$tar_path")" "$(basename "$manifest_csv")" > "$(basename "$sha_file")")

          python3 - "$artifact_root" "$PLATFORM" "$PACKAGE_ID" "$PACKAGE_VERSION" "$REQUEST_ID" "$artifact_name" "$RELEASE_MODE" "$REQUIRED" "$EXPERIMENTAL" "$ARTIFACT_CONTRACT_VERSION" <<'PY'
          import hashlib
          import json
          import pathlib
          import sys

          artifact_root = pathlib.Path(sys.argv[1])
          platform = sys.argv[2]
          package_id = sys.argv[3]
          package_version = sys.argv[4]
          request_id = sys.argv[5]
          artifact_name = sys.argv[6]
          release_mode = sys.argv[7]
          required = sys.argv[8].lower() == "true"
          experimental = sys.argv[9].lower() == "true"
          contract = sys.argv[10]

          def file_entry(path: pathlib.Path) -> dict:
              data = path.read_bytes()
              return {
                  "path": path.name,
                  "size": len(data),
                  "sha256": hashlib.sha256(data).hexdigest(),
              }

          files = [
              file_entry(path)
              for path in sorted(artifact_root.iterdir())
              if path.is_file() and path.name != "release-artifacts.manifest.json"
          ]
          release_manifest = {
              "schemaVersion": 1,
              "kind": "kano-release-artifacts",
              "packageId": package_id,
              "packageVersion": package_version,
              "platform": platform,
              "files": files,
          }
          (artifact_root / "release-artifacts.manifest.json").write_text(
              json.dumps(release_manifest, indent=2) + "\n",
              encoding="utf-8",
          )

          platform_manifest = {
              "schemaVersion": 1,
              "kind": "kano-platform-build-artifact",
              "platform": platform,
              "required": required,
              "experimental": experimental,
              "buildBackend": "github-actions",
              "backendStatus": "GITHUB_ACTIONS_BACKEND_SELECTED",
              "built": True,
              "tested": True,
              "supported": not experimental,
              "skipped": False,
              "skipReason": "",
              "message": "Built and tested by GitHub Actions cloud backend.",
              "requestId": request_id,
              "packageId": package_id,
              "packageVersion": package_version,
              "releaseMode": release_mode,
              "artifactContractVersion": contract,
              "githubActions": {
                  "artifactName": artifact_name,
                  "runId": "${{ github.run_id }}",
                  "runAttempt": "${{ github.run_attempt }}",
                  "repository": "${{ github.repository }}",
                  "workflow": "${{ github.workflow }}",
                  "runner": "${{ runner.name }}",
              },
              "files": files,
          }
          manifest_path = artifact_root / "platform" / platform / "release-artifact-manifest.json"
          manifest_path.write_text(json.dumps(platform_manifest, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Upload cloud artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: .kano/cloud-artifact/
          if-no-files-found: error
          retention-days: ${{ steps.artifact.outputs.retention_days }}
