# Built-in Scrum profile for kano-agent-backlog-skill.
id = "builtin/scrum"
name = "Scrum"
description = "Scrum-inspired workflow with agent-friendly states."
default_state = "Proposed"
states = [
    "Proposed",
    "Planned",
    "Ready",
    "InProgress",
    "Review",
    "Blocked",
    "Done",
    "Duplicate",
    "Dropped"
]
terminal_states = ["Done", "Duplicate", "Dropped"]

[[work_item_types]]
type = "Epic"
slug = "epic"

[[work_item_types]]
type = "Feature"
slug = "feature"

[[work_item_types]]
type = "UserStory"
slug = "userstory"

[[work_item_types]]
type = "Task"
slug = "task"

[[work_item_types]]
type = "Bug"
slug = "bug"

[[work_item_types]]
type = "Issue"
slug = "issue"

[transitions]
Proposed = ["Planned", "Duplicate", "Dropped"]
Planned = ["Ready", "Duplicate", "Dropped"]
Ready = ["InProgress", "Duplicate", "Dropped"]
InProgress = ["Review", "Blocked", "Duplicate", "Dropped"]
Review = ["Done", "InProgress"]
Blocked = ["InProgress", "Duplicate", "Dropped"]
Done = []
Duplicate = []
Dropped = []
