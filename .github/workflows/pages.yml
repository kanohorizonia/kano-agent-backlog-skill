name: Publish docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "src/shell/docs/**"
      - "README.md"
      - "REFERENCE.md"
      - "CHANGELOG.md"
      - "pyproject.toml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python docs dependencies
        run: python -m pip install mkdocs mkdocs-material "mkdocstrings[python]" pyyaml

      - name: Build staged docs site
        run: bash src/shell/docs/build-and-deploy.sh --ci

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _ws/build/staged

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
