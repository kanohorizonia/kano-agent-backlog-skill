[workspace]
name = "kano-agent-backlog-skill"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]

[dependencies]
bash = "*"
cmake = ">=3.21"
git = "*"
ninja = "*"
python = "3.12.*"

# =============================================================================
# Universal tasks (work on all platforms)
# =============================================================================
[tasks]
env-summary = "python --version && git --version && cmake --version && ninja --version"

# Development build (Debug preset - fast iteration)
build-dev = "bash src/cpp/build/script/windows/ninja-msvc-debug.sh"

# Tests
quick-test = "bash src/cpp/build/script/windows/run_tests.sh windows-ninja-msvc"

# =============================================================================
# Windows-specific (win-64)
# =============================================================================
[target.win-64.tasks]
build = "bash src/cpp/build/script/windows/ninja-msvc-debug.sh"
quick-test = "bash src/cpp/build/script/windows/run_tests.sh windows-ninja-msvc"

# Coverage workflow (CI-ready)
build-coverage = "bash src/cpp/build/script/windows/ninja-msvc-coverage-build.sh"
test-coverage = "bash src/cpp/build/script/windows/ninja-msvc-coverage-run.sh"
report-coverage = "bash src/cpp/build/script/windows/ninja-msvc-coverage-report.sh"
coverage-all = "bash src/cpp/build/script/windows/ninja-msvc-coverage-build.sh && bash src/cpp/build/script/windows/ninja-msvc-coverage-run.sh && bash src/cpp/build/script/windows/ninja-msvc-coverage-report.sh"

# =============================================================================
# Linux-specific (linux-64)
# =============================================================================
[target.linux-64.tasks]
build = "bash src/cpp/build/script/linux/ninja-clang-debug.sh"
quick-test = "bash src/cpp/build/script/linux/run_tests.sh linux-ninja-gcc"
